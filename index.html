<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Todo list</title>
  </head>
  <body>
    <div class="container">
      <!-- En-tête de l'application -->
      <div class="box-title">
        <svg
          class="imgLogo lucide lucide-list-todo-icon lucide-list-todo"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M13 5h8" />
          <path d="M13 12h8" />
          <path d="M13 19h8" />
          <path d="m3 17 2 2 4-4" />
          <rect x="3" y="4" width="6" height="6" rx="1" />
        </svg>
        <h1>To Do List</h1>
      </div>

      <!-- Zone principale -->
      <div class="box-left">
        <div class="box-command">
          <!-- Bouton Ajouter une tâche -->
          <div class="box-addTask">
            <svg
              class="i lucide lucide-square-plus-icon lucide-square-plus"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="18" height="18" x="3" y="3" rx="2" />
              <path d="M8 12h8" />
              <path d="M12 8v8" />
            </svg>
            <h2>Ajouter une tâche</h2>
          </div>

          <!-- Filtres de tri -->
          <div class="command">
            <fieldset>
              <legend>État</legend>
              <div class="radio-group">
                <input type="radio" name="state" id="stateAll" checked />
                <label for="stateAll">Tout</label>
              </div>
              <div class="radio-group">
                <input type="radio" name="state" id="stateIsGoing" />
                <label for="stateIsGoing">En cours</label>
              </div>
              <div class="radio-group">
                <input type="radio" name="state" id="stateCompleted" />
                <label for="stateCompleted">Terminés</label>
              </div>
            </fieldset>

            <fieldset>
              <legend>Priorité</legend>
              <div class="radio-group">
                <input type="radio" name="priority" id="priorityAll" checked />
                <label for="priorityAll">Tout</label>
              </div>
              <div class="radio-group">
                <input type="radio" name="priority" id="priorityIsLow" />
                <label for="priorityIsLow">Faible</label>
              </div>
              <div class="radio-group">
                <input type="radio" name="priority" id="priorityIsMiddle" />
                <label for="priorityIsMiddle">Moyenne</label>
              </div>
              <div class="radio-group">
                <input type="radio" name="priority" id="priorityIsHigh" />
                <label for="priorityIsHigh">Haute</label>
              </div>
            </fieldset>
          </div>
        </div>

        <!-- Liste des tâches (générée en JS) -->
        <div class="box-task">
          <ul class="listTask">
            <ul class="listTask">
              <!-- Exemple 1 : Tâche En cours & Priorité Haute -->
              <li class="task-item">
                <div class="task-main">
                  <input type="checkbox" class="task-checkbox" id="check-1" />
                  <label for="check-1" class="task-text"
                    >Faire à manger pour toute la famille</label
                  >
                </div>
                <div class="task-badges">
                  <span class="badge status-going">En cours</span>
                  <span class="badge priority-high">Haute</span>
                </div>
                <div class="task-actions">
                  <!-- Bouton Modifier -->
                  <button class="btn-action btn-edit" title="Modifier">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path d="M12 20h9" />
                      <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
                    </svg>
                  </button>
                  <!-- Bouton Supprimer -->
                  <button class="btn-action btn-delete" title="Supprimer">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path d="M3 6h18" />
                      <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                      <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                    </svg>
                  </button>
                </div>
              </li>

              <!-- Exemple 2 : Tâche Terminée & Priorité Moyenne -->
              <li class="task-item task-done">
                <div class="task-main">
                  <input
                    type="checkbox"
                    class="task-checkbox"
                    id="check-2"
                    checked
                  />
                  <label for="check-2" class="task-text"

                    </svg>

                </div>
