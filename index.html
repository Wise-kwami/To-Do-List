      <div class="boxes">

              <fieldset>
                <legend>État</legend>
                <div class="radio-group">
                  <input type="radio" name="state" id="stateAll" checked />
                  <label for="stateAll">Tout</label>
                </div>
                <div class="radio-group">
                  <input type="radio" name="state" id="stateIsGoing" />
                  <label for="stateIsGoing">En cours</label>
                </div>
                <div class="radio-group">
                  <input type="radio" name="state" id="stateCompleted" />
                  <label for="stateCompleted">Terminés</label>
                </div>
              </fieldset>

              <fieldset>
                <legend>Priorité</legend>
                <div class="radio-group">
                  <input
                    type="radio"
                    name="priority"
                    id="priorityAll"
                    checked
                  />
                  <label for="priorityAll">Tout</label>
                </div>
                <div class="radio-group">
                  <input type="radio" name="priority" id="priorityIsLow" />
                  <label for="priorityIsLow">Faible</label>
                </div>
                <div class="radio-group">
                  <input type="radio" name="priority" id="priorityIsMiddle" />
                  <label for="priorityIsMiddle">Moyenne</label>
                </div>
                <div class="radio-group">
                  <input type="radio" name="priority" id="priorityIsHigh" />
                  <label for="priorityIsHigh">Haute</label>
                </div>
              </fieldset>
            </div>

        <div class="box-right">
          <div class="newTask">
            <h2>Nouvelle tâche</h2>
            <input
              type="text"
              name="task"
              id="inputTask"
              placeholder="Nommez votre tâche"
            />

            <fieldset>
              <legend class="inputRadio">
                Choisissez la priorité de votre tâche
              </legend>
              <div class="radio-group">
                <input
                  type="radio"
                  name="new-priority"
                  value="Haute"
                  id="levelHigh"
                />
                <label for="levelHigh">Haute</label>
              </div>
              <div class="radio-group">
                <input
                  type="radio"
                  name="new-priority"
                  value="Moyenne"
                  id="levelMiddle"
                />
                <label for="levelMiddle">Moyenne</label>
              </div>
              <div class="radio-group">
                <input
                  type="radio"
                  name="new-priority"
                  value="Faible"
                  id="levelLow"
                  checked
                />
                <label for="levelLow">Faible</label>
              </div>
            </fieldset>

            <div class="btnAddNewTask">
              <button id="btnAddTask">Enregistrer la tâche</button>
              <button id="btnBack">Annuler</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const triggerZone = document.querySelector(".box-addTask h2");
        const btnBack = document.getElementById("btnBack");
        const boxesContainer = document.querySelector(".boxes");
        const dots = document.querySelectorAll(".dot span");

        if (triggerZone && boxesContainer && dots.length >= 2) {
          // Aller vers le formulaire (Slide Droite)
          triggerZone.addEventListener("click", () => {
            boxesContainer.classList.add("show-right");
            dots[0].classList.remove("active-dot");
            dots[1].classList.add("active-dot");
          });

          // Retourner à la liste (Slide Gauche)
          btnBack.addEventListener("click", () => {
            boxesContainer.classList.remove("show-right");
            dots[1].classList.remove("active-dot");
            dots[0].classList.add("active-dot");
          });
        }
      });
    </script>
